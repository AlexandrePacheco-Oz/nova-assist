<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Assist - Ferramenta de Suporte</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0f172a; --primary: #3b82f6; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .app-card { background: rgba(30, 41, 59, 0.7); width: 100%; height: 100%; display: flex; flex-direction: column; padding: 2rem; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); }
        
        .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; }
        .logo-icon { background: var(--primary); padding: 0.5rem; border-radius: 10px; }
        
        .id-section { background: rgba(0,0,0,0.3); padding: 2rem; border-radius: 20px; text-align: center; border: 1px dashed var(--primary); margin-bottom: 2rem; }
        .id-label { font-size: 0.8rem; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .id-value { font-size: 2.5rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; font-family: monospace; }
        
        .status-box { flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; gap: 1rem; color: #94a3b8; }
        .pulse { width: 12px; height: 12px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        .btn-stop { background: #ef4444; color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: auto; }
        
        /* Floating Pointer and Chat from previous version */
        .pointer { position: absolute; width: 40px; height: 40px; border: 3px solid #ef4444; border-radius: 50%; background: rgba(239, 68, 68, 0.3); pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); animation: pulse-pointer 1s infinite; }
        @keyframes pulse-pointer { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
        .chat-msg { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: white; padding: 1rem 1.5rem; border-radius: 18px 18px 0 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; max-width: 80%; z-index: 2000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        #overlay-area { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="header">
            <div class="logo-icon"><i data-lucide="shield-check" color="white"></i></div>
            <div style="font-weight: 700; font-size: 1.2rem;">Nova Assist Support Tool</div>
        </div>

        <div class="id-section">
            <div class="id-label">Seu Código de Acesso</div>
            <div class="id-value" id="my-id">--- ---</div>
            <div style="margin-top: 1rem; font-size: 0.9rem; color: #94a3b8;">Informe este código ao seu técnico</div>
        </div>

        <div class="status-box">
            <div id="status-text"><span class="pulse"></span> Aguardando Técnico...</div>
            <div id="chat-box" style="margin-top: 1rem; text-align: left; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 10px; max-height: 100px; overflow-y: auto; font-size: 0.8rem;">
                <div style="color: var(--primary); font-weight: bold; margin-bottom: 0.3rem;">Chat de Suporte:</div>
                <div id="chat-history"></div>
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                <input type="text" id="client-msg" placeholder="Digite aqui..." style="flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.5rem; border-radius: 5px;">
                <button onclick="sendClientChat()" style="background: var(--primary); border: none; color: white; padding: 0.5rem; border-radius: 5px; cursor: pointer;"><i data-lucide="send" size="16"></i></button>
            </div>
            <button onclick="startTransmission()" class="btn-action" style="margin-top: 1rem; background: var(--primary); padding: 0.8rem; border-radius: 10px; color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%;">
                <i data-lucide="monitor"></i> Compartilhar Tela Agora
            </button>
        </div>

        <button class="btn-stop" onclick="window.close()">Encerrar Suporte</button>
    </div>

    <div id="overlay-area"></div>

    <script>
        lucide.createIcons();
        let peer, currentCall, currentConn, localStream;

        // PeerJS Config com ID Numérico e TURN Server
        const numericId = Math.floor(100000 + Math.random() * 900000).toString();
        peer = new Peer('nova-' + numericId, {
            config: { 
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:openrelay.metered.ca:80' },
                    { urls: 'stun:openrelay.metered.ca:443' }
                ] 
            }
        });

        peer.on('open', (id) => {
            const code = id.replace('nova-', '');
            document.getElementById('my-id').innerText = code.slice(0,3) + ' ' + code.slice(3);
        });

        peer.on('connection', (conn) => {
            currentConn = conn;
            document.getElementById('status-text').innerHTML = '<span class="pulse" style="background:#3b82f6"></span> Técnico Conectado';

            conn.on('data', (data) => {
                if (data.type === 'request_stream') {
                    console.log("Pedido de stream recebido!");
                    startTransmission(conn.peer);
                }
                if (data.type === 'pointer') showPointer(data.x, data.y);
                if (data.type === 'chat') addChatMessage('Técnico', data.msg);
            });
        });

        function addChatMessage(sender, msg) {
            const history = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.innerHTML = `<strong>${sender}:</strong> ${msg}`;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
            
            // Alerta visual flutuante (Opcional)
            if (sender === 'Técnico') showFloatingMsg(msg);
        }

        function sendClientChat() {
            const input = document.getElementById('client-msg');
            if (!input.value || !currentConn) return;
            currentConn.send({ type: 'chat', msg: input.value });
            addChatMessage('Eu', input.value);
            input.value = '';
        }

        function showFloatingMsg(msg) {
            const m = document.createElement('div');
            m.className = 'chat-msg';
            m.style.display = 'block';
            m.innerHTML = `<strong>Técnico:</strong><br>${msg}`;
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 8000);
        }

        async function startTransmission(techId) {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                localStream = stream;
                peer.call(techId, stream);
                document.getElementById('status-text').innerHTML = '<span class="pulse" style="background:#10b981"></span> Transmissão Ativa';
                stream.getVideoTracks()[0].onended = () => location.reload();
            } catch (err) {
                console.error(err);
            }
        }

        function showPointer(x, y) {
            const area = document.getElementById('overlay-area');
            const p = document.createElement('div');
            p.className = 'pointer';
            p.style.left = x + '%'; p.style.top = y + '%';
            area.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }

        function showChat(msg) {
            const m = document.createElement('div');
            m.className = 'chat-msg';
            m.style.display = 'block';
            m.innerHTML = `<strong>Técnico:</strong><br>${msg}`;
            document.body.appendChild(m);
            
            // Toca um som ou vibra se possível
            if (navigator.vibrate) navigator.vibrate(200);

            setTimeout(() => {
                m.style.opacity = '0';
                setTimeout(() => m.remove(), 500);
            }, 10000);
        }

        // Suporte PWA (Para instalação segura)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
    </script>
</body>
</html>
