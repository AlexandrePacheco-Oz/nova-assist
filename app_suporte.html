<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Assist - Ferramenta de Suporte</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --primary: #3b82f6; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .app-card { background: rgba(30, 41, 59, 0.7); width: 100%; height: 100%; display: flex; flex-direction: column; padding: 2rem; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); }
        
        .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; }
        .logo-icon { background: var(--primary); padding: 0.5rem; border-radius: 10px; }
        
        .id-section { background: rgba(0,0,0,0.3); padding: 2rem; border-radius: 20px; text-align: center; border: 1px dashed var(--primary); margin-bottom: 2rem; }
        .id-label { font-size: 0.8rem; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .id-value { font-size: 2.5rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; font-family: monospace; }
        
        .status-box { flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; gap: 1rem; color: #94a3b8; }
        .pulse { width: 12px; height: 12px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        .btn-stop { background: #ef4444; color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: auto; }
        
        /* Floating Pointer and Chat from previous version */
        .pointer { position: absolute; width: 40px; height: 40px; border: 3px solid #ef4444; border-radius: 50%; background: rgba(239, 68, 68, 0.3); pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); animation: pulse-pointer 1s infinite; }
        @keyframes pulse-pointer { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
        .chat-msg { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: white; padding: 1rem 1.5rem; border-radius: 18px 18px 0 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; max-width: 80%; z-index: 2000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        #overlay-area { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="header">
            <div class="logo-icon"><i data-lucide="shield-check" color="white"></i></div>
            <div style="font-weight: 700; font-size: 1.2rem;">Nova Assist Support Tool</div>
        </div>

        <div class="id-section">
            <div class="id-label">Seu Código de Acesso</div>
            <div class="id-value" id="my-id">--- ---</div>
            <div style="margin-top: 1rem; font-size: 0.9rem; color: #94a3b8;">Informe este código ao seu técnico</div>
        </div>

        <div class="status-box">
            <div id="status-text"><span class="pulse"></span> Pronto para conectar</div>
            <div style="font-size: 0.8rem;">O técnico poderá visualizar sua tela e enviar instruções após a conexão.</div>
        </div>

        <button class="btn-stop" onclick="window.close()">Encerrar Suporte</button>
    </div>

    <div id="overlay-area"></div>

    <script>
        lucide.createIcons();
        let peer, currentCall, currentConn, localStream;

        // Auto-Init
        peer = new Peer('nova-' + Math.random().toString(36).substr(2, 6), {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('connection', (conn) => {
            currentConn = conn;
            document.getElementById('status-text').innerHTML = '<span class="pulse" style="background:#3b82f6"></span> Técnico Conectado';
            
            conn.on('data', (data) => {
                if (data.type === 'request_stream') startTransmission(conn.peer);
                if (data.type === 'pointer') showPointer(data.x, data.y);
                if (data.type === 'chat') showChat(data.msg);
            });
        });

        async function startTransmission(techId) {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                localStream = stream;
                peer.call(techId, stream);
                document.getElementById('status-text').innerHTML = '<span class="pulse" style="background:#10b981"></span> Transmitindo ao Vivo';
                stream.getVideoTracks()[0].onended = () => location.reload();
            } catch (err) {
                alert('Erro ao compartilhar: ' + err.message);
            }
        }

        function showPointer(x, y) {
            const area = document.getElementById('overlay-area');
            const p = document.createElement('div');
            p.className = 'pointer';
            p.style.left = x + '%'; p.style.top = y + '%';
            area.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }

        function showChat(msg) {
            const m = document.createElement('div');
            m.className = 'chat-msg'; m.innerText = msg;
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 8000);
        }
    </script>
</body>
</html>
