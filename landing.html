<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Assist | Baixar Ferramenta de Suporte</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --text: #f8fafc;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 10px 20px var(--primary-glow);
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 2.5rem; }
        
        .download-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 1.2rem 2.5rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .download-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }
        .footer { margin-top: 2rem; font-size: 0.85rem; color: #475569; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <i data-lucide="shield-check" color="white" size="40"></i>
        </div>
        <h1>Nova Assist</h1>
        <p>Para iniciar o suporte remoto, baixe nossa ferramenta rápida e segura. Não requer instalação.</p>
        
        <a href="app_suporte.exe" class="download-btn">
            <i data-lucide="download"></i>
            Baixar Ferramenta (.exe)
        </a>

        <div class="footer">
            Compatível com Windows 10/11
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
